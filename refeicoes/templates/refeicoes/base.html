<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Registrador de Refeições{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        .navbar {
            background-color: #1f1f1f !important;
        }

        .card {
            background-color: #1e1e1e;
            color: #e0e0e0;
            box-shadow: 0 2px 6px rgba(0,0,0,.5);
        }

        .card-header {
            background-color: #2a2a2a;
            border-bottom: 1px solid #333;
        }

        .table {
            color: #e0e0e0;
        }

        .table-light {
            background-color: #2a2a2a;
            color: #fff;
        }

        .form-control,
        .form-select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #2a2a2a;
            color: #fff;
            border-color: #133569;
            box-shadow: none;
        }

        .btn-outline-secondary {
            color: #ccc;
            border-color: #555;
        }

        .btn-outline-secondary:hover {
            background-color: #333;
        }

        .bg-success {
            background-color: #0d3b66 !important;
        }

        .btn.btn-success {
            background-color: #0d3b66 !important;
            border-color: #000000;
        }
        .text-muted {
            color: #aaa !important;
        }

        footer {
            color: #888;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'refeicoes:index' %}">🍽️ Registrador de Refeições</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'refeicoes:adicionar' %}">+ Nova Refeição</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>Registrador de Refeições</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
